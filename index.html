<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFB Calc</title>
  <style>
    :root {
      --bg: #0f1728;
      --panel: #182338;
      --panel-soft: #1d2a44;
      --line: rgba(154, 177, 214, 0.18);
      --line-strong: rgba(190, 210, 242, 0.26);
      --text: #f2f6ff;
      --muted: #8fa5cd;
      --blue: #4f92ff;
      --blue-strong: #3579eb;
      --pill: #22304c;
      --danger: #ff7f86;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Inter, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 146, 255, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(99, 197, 255, 0.10), transparent 24%),
        linear-gradient(180deg, #0b1322 0%, #10192c 100%);
      padding: 16px;
    }

    .app {
      width: min(1220px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr 360px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: linear-gradient(180deg, rgba(24, 35, 56, 0.96), rgba(20, 30, 48, 0.94));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    h2, h3, p {
      margin: 0;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .badge {
      border: 1px solid rgba(255, 127, 134, 0.45);
      color: #ff9ca1;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      background: rgba(255, 127, 134, 0.08);
    }

    .badge.ready {
      border-color: rgba(111, 229, 156, 0.42);
      color: #9df0b8;
      background: rgba(111, 229, 156, 0.10);
    }

    .field {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .search-wrap {
      position: relative;
    }

    .search-tools {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .search-tools label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .search-size-select {
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(12, 19, 31, 0.8);
      color: var(--text);
      padding: 0 10px;
      font: inherit;
      font-size: 12px;
      outline: none;
    }

    .selected-brainrot-label {
      position: absolute;
      left: 14px;
      right: 44px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      display: none;
      z-index: 1;
    }

    .search-wrap.has-selection .selected-brainrot-label {
      display: block;
    }

    .search-wrap.has-selection .search-input {
      color: transparent;
      caret-color: var(--text);
    }

    .search-wrap.has-selection .search-input::selection {
      background: rgba(79, 146, 255, 0.24);
      color: transparent;
    }

    .search-input {
      width: 100%;
      height: 44px;
      padding: 0 44px 0 14px;
      border-radius: 16px;
      border: 1px solid var(--line-strong);
      background: rgba(14, 23, 37, 0.46);
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    .search-input::placeholder {
      color: #7287af;
    }

    .clear-search {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
    }

    .search-wrap.open .clear-search {
      opacity: 1;
      pointer-events: auto;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      padding: 14px;
      margin-bottom: 12px;
    }

    .stat-main {
      font-size: 38px;
      line-height: 1;
      font-weight: 700;
      margin: 2px 0 6px;
    }

    .subtle {
      color: var(--muted);
      font-size: 14px;
    }

    .divider {
      border-top: 1px solid var(--line);
      margin: 14px 0;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(12, 19, 31, 0.65);
      margin-bottom: 16px;
    }

    .segmented button,
    .level-btn,
    .action-btn {
      font: inherit;
      cursor: pointer;
      border: 0;
      color: var(--text);
    }

    .segmented button {
      border-radius: 999px;
      height: 34px;
      background: transparent;
      font-weight: 600;
    }

    .segmented button.active {
      background: linear-gradient(180deg, var(--blue), var(--blue-strong));
    }

    .segmented button.accent-gray.active {
      background: linear-gradient(180deg, #8993a5, #6f7889);
    }

    .segmented button.accent-green.active {
      background: linear-gradient(180deg, #83ec99, #54bf6b);
    }

    .segmented button.accent-light-blue.active {
      background: linear-gradient(180deg, #98dcff, #63b8f4);
    }

    .segmented button.accent-purple.active {
      background: linear-gradient(180deg, #c59dff, #8f64e6);
    }

    .segmented button.accent-light-yellow.active {
      background: linear-gradient(180deg, #ffe881, #e8b93e);
      color: #1d1a0d;
    }

    .segmented button.accent-red.active {
      background: linear-gradient(180deg, #ff8d8d, #d55454);
    }

    .segmented button.accent-dark-pink.active {
      background: linear-gradient(180deg, #efabd2, #c86f9f);
    }

    .segmented button.accent-wave-gray.active {
      background: linear-gradient(120deg, #d8dbe1, #6a707a, #181b20, #d8dbe1);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .segmented button.accent-yellow-orange.active {
      background: linear-gradient(180deg, #ffef7e, #ffb853, #ff8f36);
      color: #231807;
    }

    .segmented button.accent-white-black-mid.active {
      background: linear-gradient(120deg, #ffffff, #d7d7d7, #111111, #ffffff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .segmented button.accent-wave-rainbow.active {
      background: linear-gradient(120deg, #94ddff, #4f92ff, #9b6dff, #f58fd6, #94ddff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .segmented button.accent-wave-black-white.active {
      background: linear-gradient(120deg, #ffffff, #c8ccd4, #0f1117, #ffffff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .segmented button.accent-wave-sun.active {
      background: linear-gradient(180deg, #ffef7e, #ffc85e, #ff9937);
      color: #231807;
    }

    .segmented button.accent-wave-ocean.active {
      background: linear-gradient(180deg, #c7f6ff, #6cc3ff, #16358f);
    }

    .segmented button.accent-rainbow.active {
      background: linear-gradient(120deg, #ff7b7b, #ffba66, #fff06e, #82ef9f, #7fd7ff, #a88dff, #ff8ddb);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
      color: #17130c;
    }

    .level-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      margin-bottom: 8px;
    }

    .level-btn,
    .level-display {
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line-strong);
      background: rgba(12, 19, 31, 0.65);
      font-weight: 600;
    }

    .level-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .level-display {
      width: 100%;
      text-align: center;
      color: var(--text);
      outline: none;
      font: inherit;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .level-display::-webkit-outer-spin-button,
    .level-display::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .action-btn {
      width: 100%;
      height: 44px;
      border-radius: 15px;
      background: linear-gradient(180deg, var(--blue), var(--blue-strong));
      font-weight: 700;
      margin-top: 10px;
      transition: background 180ms ease, box-shadow 180ms ease, color 180ms ease, transform 120ms ease;
      transform: scale(1);
    }

    .action-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .action-btn:disabled,
    .level-btn:disabled,
    .level-display:disabled,
    .mutation:disabled,
    .segmented button:disabled {
      cursor: default;
      opacity: 1;
    }

    .mutation:disabled:hover,
    .segmented button:disabled:hover {
      transform: none;
      border-color: rgba(255, 255, 255, 0.82);
    }

    .level-btn:disabled,
    .level-display:disabled,
    .segmented button:disabled,
    .mutation:disabled,
    .action-btn:disabled {
      filter: none;
    }

    .mutations-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mutation {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      border-radius: 17px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      background: #ffffff;
      color: #12203a;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .mutation-content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .mutation:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 171, 255, 0.9);
    }

    .mutation.active {
      background: #dce9ff;
      border-color: rgba(102, 165, 255, 0.95);
    }

    .mutation-name {
      font-weight: 600;
    }

    .mutation-bonus {
      color: #5573a5;
      white-space: nowrap;
    }

    .trait-card::before,
    .animated-border-card::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 20px;
      padding: 3px;
      background:
        repeating-linear-gradient(
          135deg,
          var(--bonus-color-1, #7fd7ff) 0 var(--bonus-step, 72px),
          var(--bonus-color-2, #4f92ff) var(--bonus-step, 72px) calc(var(--bonus-step, 72px) * 2),
          var(--bonus-color-3, var(--bonus-color-1, #7fd7ff)) calc(var(--bonus-step, 72px) * 2) calc(var(--bonus-step, 72px) * 3),
          var(--bonus-color-4, var(--bonus-color-2, #4f92ff)) calc(var(--bonus-step, 72px) * 3) calc(var(--bonus-step, 72px) * 4)
        );
      background-size: 500% 500%;
      opacity: 0;
      transition: opacity 180ms ease;
      animation: traitFlow 6.2s linear infinite;
      z-index: 0;
      pointer-events: none;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask-composite: exclude;
    }

    .trait-card.active,
    .animated-border-card.active {
      background: #ffffff;
      border-color: rgba(25, 25, 31, 0.18);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
    }

    .trait-card.active::before,
    .animated-border-card.active::before {
      opacity: 1;
    }

    @keyframes traitFlow {
      0% {
        background-position: 0% 0%;
      }

      100% {
        background-position: 100% 100%;
      }
    }

    .result-card {
      min-height: 118px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .metric {
      min-height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .stat-accent {
      transition: color 180ms ease, background-image 180ms ease;
    }

    .accent-gray {
      color: #a9b2c3;
    }

    .accent-green {
      color: #76e58d;
    }

    .accent-light-blue {
      color: #86cfff;
    }

    .accent-purple {
      color: #b68cff;
    }

    .accent-light-yellow {
      color: #ffe679;
    }

    .accent-red {
      color: #ff7a7a;
    }

    .accent-dark-pink {
      color: #e08bc2;
    }

    .accent-wave-gray,
    .accent-yellow-orange,
    .accent-white-black-mid,
    .accent-wave-rainbow,
    .accent-wave-black-white,
    .accent-wave-sun,
    .accent-wave-ocean,
    .accent-rainbow {
      background-size: 220% 220%;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: brainrotWave 4.8s linear infinite;
    }

    .accent-wave-gray {
      background-image: linear-gradient(120deg, #0f1117 0%, #666b74 35%, #d6d9df 50%, #555a63 70%, #0f1117 100%);
    }

    .accent-yellow-orange {
      background-image: linear-gradient(180deg, #ffef7e 0%, #ffc85e 45%, #ff9937 100%);
    }

    .accent-white-black-mid {
      background-image: linear-gradient(90deg, #ffffff 0%, #e7e7e7 35%, #111111 50%, #ebebeb 65%, #ffffff 100%);
    }

    .accent-wave-rainbow {
      background-image: linear-gradient(120deg, #94ddff 0%, #4f92ff 25%, #9b6dff 50%, #f58fd6 75%, #94ddff 100%);
    }

    .accent-wave-black-white {
      background-image: linear-gradient(120deg, #ffffff 0%, #d7d7d7 25%, #0f1117 50%, #c8ccd4 75%, #ffffff 100%);
    }

    .accent-wave-sun {
      background-image: linear-gradient(180deg, #ffef7e 0%, #ffc85e 45%, #ff9937 100%);
    }

    .accent-wave-ocean {
      background-image: linear-gradient(180deg, #c7f6ff 0%, #6cc3ff 38%, #16358f 100%);
    }

    .accent-vanga {
      color: #8fe4ff;
      text-shadow: var(--vanga-sparkles, 0 0 10px rgba(143, 228, 255, 0.32));
    }

    .accent-rainbow {
      background-image: linear-gradient(120deg, #ff7b7b 0%, #ffba66 18%, #fff06e 36%, #82ef9f 54%, #7fd7ff 72%, #a88dff 86%, #ff8ddb 100%);
    }

    .action-btn.accent-gray {
      background: linear-gradient(180deg, #8993a5, #6f7889);
    }

    .action-btn.accent-green {
      background: linear-gradient(180deg, #83ec99, #54bf6b);
    }

    .action-btn.accent-light-blue {
      background: linear-gradient(180deg, #98dcff, #63b8f4);
    }

    .action-btn.accent-purple {
      background: linear-gradient(180deg, #c59dff, #8f64e6);
    }

    .action-btn.accent-light-yellow {
      background: linear-gradient(180deg, #ffe881, #e8b93e);
      color: #1d1a0d;
    }

    .action-btn.accent-red {
      background: linear-gradient(180deg, #ff8d8d, #d55454);
    }

    .action-btn.accent-dark-pink {
      background: linear-gradient(180deg, #efabd2, #c86f9f);
    }

    .action-btn.accent-wave-gray {
      background: linear-gradient(120deg, #d8dbe1, #6a707a, #181b20, #d8dbe1);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .action-btn.accent-yellow-orange {
      background: linear-gradient(180deg, #ffef7e, #ffb853, #ff8f36);
    }

    .action-btn.accent-white-black-mid {
      background: linear-gradient(120deg, #ffffff, #d7d7d7, #111111, #ffffff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .action-btn.accent-wave-rainbow {
      background: linear-gradient(120deg, #94ddff, #4f92ff, #9b6dff, #f58fd6, #94ddff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .action-btn.accent-wave-black-white {
      background: linear-gradient(120deg, #ffffff, #c8ccd4, #0f1117, #ffffff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .action-btn.accent-wave-sun {
      background: linear-gradient(180deg, #ffef7e, #ffc85e, #ff9937);
      color: #231807;
    }

    .action-btn.accent-wave-ocean {
      background: linear-gradient(180deg, #c7f6ff, #6cc3ff, #16358f);
    }

    .action-btn.accent-rainbow {
      background: linear-gradient(120deg, #ff7b7b, #ffba66, #fff06e, #82ef9f, #7fd7ff, #a88dff, #ff8ddb);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #16233a;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
      display: none;
      z-index: 5;
      overflow-y: auto;
      max-height: 360px;
      scrollbar-width: thin;
      scrollbar-color: rgba(127, 170, 245, 0.55) rgba(18, 31, 52, 0.65);
    }

    .search-results.show {
      display: block;
    }

    .search-results.size-small {
      max-height: 240px;
    }

    .search-results.size-medium {
      max-height: 360px;
    }

    .search-results.size-large {
      max-height: 520px;
    }

    .search-results::-webkit-scrollbar {
      width: 10px;
    }

    .search-results::-webkit-scrollbar-track {
      background: rgba(18, 31, 52, 0.65);
    }

    .search-results::-webkit-scrollbar-thumb {
      background: rgba(127, 170, 245, 0.55);
      border-radius: 999px;
      border: 2px solid rgba(18, 31, 52, 0.65);
    }

    .search-option {
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
    }

    .search-option:hover {
      background: rgba(79, 146, 255, 0.12);
    }

    .search-option.unavailable {
      cursor: not-allowed;
      color: #7f91b3;
    }

    .search-option.unavailable:hover {
      background: transparent;
    }

    .search-rarity-block + .search-rarity-block {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(154, 177, 214, 0.14);
    }

    .search-rarity-label {
      padding: 2px 14px 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brainrot-name {
      font-weight: 700;
    }

    .vanga-host {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0;
      isolation: isolate;
    }

    .vanga-letter {
      position: relative;
      display: inline-block;
    }

    .vanga-sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow:
        0 0 8px rgba(255, 255, 255, 0.7),
        0 0 14px rgba(143, 228, 255, 0.55);
      pointer-events: none;
      opacity: 0;
      z-index: 2;
      animation: vangaSparkleFloat 1s ease-out forwards;
    }

    .brainrot-gray {
      color: #a9b2c3;
    }

    .brainrot-green {
      color: #76e58d;
    }

    .brainrot-light-blue {
      color: #86cfff;
    }

    .brainrot-purple {
      color: #b68cff;
    }

    .brainrot-light-yellow {
      color: #ffe679;
    }

    .brainrot-red {
      color: #ff7a7a;
    }

    .brainrot-dark-pink {
      color: #e08bc2;
    }

    .brainrot-wave-gray,
    .brainrot-yellow-orange,
    .brainrot-white-black-mid,
    .brainrot-wave-rainbow,
    .brainrot-wave-black-white,
    .brainrot-wave-sun,
    .brainrot-wave-ocean,
    .brainrot-rainbow,
    .brainrot-top-secret {
      background-size: 220% 220%;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: brainrotWave 4.8s linear infinite;
    }

    .brainrot-wave-gray {
      background-image: linear-gradient(120deg, #0f1117 0%, #666b74 35%, #d6d9df 50%, #555a63 70%, #0f1117 100%);
    }

    .brainrot-yellow-orange {
      background-image: linear-gradient(180deg, #ffe86f 0%, #ffd84e 45%, #ffb347 100%);

      selectedMutations: new Set(),
      hasCalculated: false
    };

    const activeVangaTimers = new Map();

    const els = {
      search: document.getElementById("brainrotSearch"),
      searchWrap: document.querySelector(".search-wrap"),
      clear: document.getElementById("clearSearch"),
      selectedBrainrotLabel: document.getElementById("selectedBrainrotLabel"),
      results: document.getElementById("searchResults"),
      baseStat: document.getElementById("baseStat"),
      selectedUnit: document.getElementById("selectedUnit"),
      mutationTotal: document.getElementById("mutationTotal"),
      rankSelector: document.getElementById("rankSelector"),
      levelValue: document.getElementById("levelValue"),
      statusBadge: document.getElementById("statusBadge"),
      finalStat: document.getElementById("finalStat"),
      finalUnit: document.getElementById("finalUnit"),
      rankMultiplier: document.getElementById("rankMultiplier"),
      levelMultiplier: document.getElementById("levelMultiplier"),
      mutationMultiplier: document.getElementById("mutationMultiplier"),
      formulaValue: document.getElementById("formulaValue"),
      traitsGrid: document.getElementById("traitsGrid"),
      mutationsGrid: document.getElementById("mutationsGrid"),
      calculateBtn: document.getElementById("calculateBtn"),
      levelDown: document.getElementById("levelDown"),
      levelUp: document.getElementById("levelUp")
    };

    function formatMoney(value) {
      if (value >= 1000000000000000) {
        const quadrillions = value / 1000000000000000;
        return `${Number(quadrillions.toFixed(quadrillions >= 10 ? 0 : 2)).toString()}QA`;
      }

      if (value >= 1000000000000) {
        const trillions = value / 1000000000000;
        return `${Number(trillions.toFixed(trillions >= 10 ? 0 : 2)).toString()}T`;
      }

      if (value >= 1000000000) {
        const billions = value / 1000000000;
        return `${Number(billions.toFixed(billions >= 10 ? 0 : 2)).toString()}B`;
      }

      if (value >= 1000000) {
        const millions = value / 1000000;
        return `${Number(millions.toFixed(millions >= 10 ? 0 : 2)).toString()}M`;
      }

      return new Intl.NumberFormat("en-US", {
        maximumFractionDigits: value >= 100 ? 0 : 2
      }).format(value);
    }

    function formatMaybeAround(value, stat) {
      const formatted = formatMoney(value);
      return stat?.approximate ? `[Around] ${formatted}` : formatted;
    }

    function getRarityMeta(stat) {
      const colorClass = brainrotColors[stat.name] || "brainrot-gray";
      return rarityMeta[colorClass] || rarityMeta["brainrot-gray"];
    }

    function shouldHideFromOpenList(stat) {
      return stat.name === "Ace" || stat.secretLabel === "Top Secret" || stat.secretLabel === "G.O.A.T";
    }

    function clearAccentClasses(element) {
      for (const className of Object.values(accentMap)) {
        element.classList.remove(className);
      }
    }

    function randomBetween(min, max) {
      return (Math.random() * (max - min)) + min;
    }

    function buildVangaSparkles() {
      const sparkles = [];
      for (let i = 0; i < 7; i += 1) {
        const x = randomBetween(-18, 18).toFixed(1);
        const y = randomBetween(-14, 14).toFixed(1);
        const size = randomBetween(0, 1.8).toFixed(1);
        const color = i % 2 === 0 ? "rgba(255,255,255,0.95)" : "rgba(143,228,255,0.82)";
        sparkles.push(`${x}px ${y}px 0 ${size}px ${color}`);
      }
      sparkles.push("0 0 10px rgba(143,228,255,0.32)");
      return sparkles.join(", ");
    }

    function applyVangaSparkles(element, enabled) {
      if (!element) return;
      if (enabled) {
        element.style.setProperty("--vanga-sparkles", buildVangaSparkles());
      } else {
        element.style.removeProperty("--vanga-sparkles");
      }
    }

    function renderBrainrotNameMarkup(name, colorClass) {
      if (colorClass !== "brainrot-vanga") {
        return name;
      }

      const letters = [...name].map((letter) =>
        `<span class="vanga-letter">${letter === " " ? "&nbsp;" : letter}</span>`
      ).join("");

      return `<span class="vanga-host" data-vanga-text="true">${letters}</span>`;
    }

    function clearVangaSparkleTimers() {
      for (const timer of activeVangaTimers.values()) {
        clearInterval(timer);
      }
      activeVangaTimers.clear();
    }

    function emitVangaSparkle(host) {
      const letters = [...host.querySelectorAll(".vanga-letter")];
      if (!letters.length) {
        return;
      }

      const letter = letters[Math.floor(Math.random() * letters.length)];
      const sparkle = document.createElement("span");
      sparkle.className = "vanga-sparkle";
      sparkle.style.left = `${letter.offsetLeft + (letter.offsetWidth / 2) - 3}px`;
      sparkle.style.top = `${Math.max(0, letter.offsetTop + (letter.offsetHeight / 2) - 3)}px`;
      sparkle.style.setProperty("--sparkle-x", `${randomBetween(-8, 8).toFixed(1)}px`);
      sparkle.style.setProperty("--sparkle-y", `${randomBetween(-22, -10).toFixed(1)}px`);
      sparkle.style.background = Math.random() > 0.45 ? "rgba(255,255,255,0.96)" : "rgba(143,228,255,0.88)";
      host.appendChild(sparkle);

      window.setTimeout(() => {
        sparkle.remove();
      }, 1050);
    }

    function setupVangaSparkleTimers() {
      clearVangaSparkleTimers();
      const hosts = document.querySelectorAll("[data-vanga-text='true']");
      hosts.forEach((host) => {
        emitVangaSparkle(host);
        const timer = window.setInterval(() => emitVangaSparkle(host), 1000);
        activeVangaTimers.set(host, timer);
      });
    }

    function updateSelectedBrainrotLabel() {
      els.selectedBrainrotLabel.className = "selected-brainrot-label brainrot-name";
      applyVangaSparkles(els.selectedBrainrotLabel, false);

      if (!state.selectedStat) {
        els.selectedBrainrotLabel.textContent = "";
        els.searchWrap.classList.remove("has-selection");
        setupVangaSparkleTimers();
        return;
      }

      const brainrotClass = brainrotColors[state.selectedStat.name];
      if (brainrotClass) {
        els.selectedBrainrotLabel.classList.add(brainrotClass);
      }
      els.selectedBrainrotLabel.innerHTML = renderBrainrotNameMarkup(state.selectedStat.name, brainrotClass);
      applyVangaSparkles(els.selectedBrainrotLabel, brainrotClass === "brainrot-vanga");
      els.searchWrap.classList.add("has-selection");
      setupVangaSparkleTimers();
    }

    function getSelectedAnimatedPair() {
      if (!state.selectedStat) {
        return ["#7fd7ff", "#4f92ff", "#7fd7ff", "#4f92ff"];
      }

      const brainrotClass = brainrotColors[state.selectedStat.name];
      return animatedAccentPairs[brainrotClass] || ["#7fd7ff", "#4f92ff", "#7fd7ff", "#4f92ff"];
    }

    function getSelectedBonusStripeSize() {
      if (!state.selectedStat) {
        return "72px";
      }

      const brainrotClass = brainrotColors[state.selectedStat.name];
      if (brainrotClass === "brainrot-wave-rainbow" || brainrotClass === "brainrot-rainbow") {
        return "42px";
      }

      return "72px";
    }

    function applySelectedAccent() {
      clearAccentClasses(els.calculateBtn);
      clearAccentClasses(els.baseStat);
      clearAccentClasses(els.finalStat);
      clearAccentClasses(els.finalUnit);
      clearAccentClasses(els.mutationTotal);
      clearAccentClasses(els.rankMultiplier);
      clearAccentClasses(els.levelMultiplier);
      clearAccentClasses(els.mutationMultiplier);
      clearAccentClasses(els.formulaValue);
      els.calculateBtn.style.color = "";
      applyVangaSparkles(els.baseStat, false);
      applyVangaSparkles(els.finalStat, false);
      applyVangaSparkles(els.finalUnit, false);
      applyVangaSparkles(els.mutationTotal, false);
      applyVangaSparkles(els.rankMultiplier, false);
      applyVangaSparkles(els.levelMultiplier, false);
      applyVangaSparkles(els.mutationMultiplier, false);
      applyVangaSparkles(els.formulaValue, false);

      if (!state.selectedStat) {
        return;
      }

      const accentClass = accentMap[brainrotColors[state.selectedStat.name]];
      if (!accentClass) {
        return;
      }

      const isVanga = accentClass === "accent-vanga";

      if (isVanga) {
        els.baseStat.classList.add(accentClass);
        els.mutationTotal.classList.add(accentClass);
        els.rankMultiplier.classList.add(accentClass);
        els.levelMultiplier.classList.add(accentClass);
        els.mutationMultiplier.classList.add(accentClass);
        els.formulaValue.classList.add(accentClass);
        els.finalStat.classList.add(accentClass);
        els.finalUnit.classList.add("accent-light-blue");
        applyVangaSparkles(els.baseStat, true);
        applyVangaSparkles(els.mutationTotal, true);
        applyVangaSparkles(els.rankMultiplier, true);
        applyVangaSparkles(els.levelMultiplier, true);
        applyVangaSparkles(els.mutationMultiplier, true);
        applyVangaSparkles(els.formulaValue, true);
        applyVangaSparkles(els.finalStat, true);
        return;
      }

      els.calculateBtn.classList.add(accentClass);
      els.baseStat.classList.add(accentClass);
      els.mutationTotal.classList.add(accentClass);
      els.rankMultiplier.classList.add(accentClass);
      els.levelMultiplier.classList.add(accentClass);
      els.mutationMultiplier.classList.add(accentClass);
      els.formulaValue.classList.add(accentClass);
      els.finalStat.classList.add(accentClass);
      els.finalUnit.classList.add(accentClass);
      els.calculateBtn.style.color = darkTextAccents.has(accentClass) ? "#17130c" : "#f8fbff";
    }

    function invalidateCalculatedResult() {
      state.hasCalculated = false;
    }

    function updateControlLocking() {
      const hasSelection = Boolean(state.selectedStat);
      els.calculateBtn.disabled = !hasSelection;
      els.levelDown.disabled = !hasSelection;
      els.levelUp.disabled = !hasSelection;
      els.levelValue.disabled = !hasSelection;
    }

    function renderRanks() {
      els.rankSelector.innerHTML = "";
      const accentClass = state.selectedStat ? accentMap[brainrotColors[state.selectedStat.name]] : "";
      for (let i = 0; i <= 4; i += 1) {
        const button = document.createElement("button");
        button.disabled = !state.selectedStat;
        button.textContent = String(i);
        if (state.rank === i) {
          button.classList.add("active");
          if (accentClass) {
            button.classList.add(accentClass);
          }
        }
        button.addEventListener("click", () => {
          state.rank = i;
          invalidateCalculatedResult();
          renderRanks();
          calculate();
        });
        els.rankSelector.appendChild(button);
      }
    }

    function renderBonusGrid(container, items, type) {
      container.innerHTML = "";

      for (const [name, bonus] of items) {
        const item = document.createElement("button");
        const isTrait = type === "trait";
        const isActive = state.selectedMutations.has(name);
        const [color1, color2, color3, color4] = getSelectedAnimatedPair();

        item.className = `mutation animated-border-card${isTrait ? " trait-card" : ""}`;
        item.disabled = !state.selectedStat;
        if (isActive) item.classList.add("active");
        item.style.setProperty("--bonus-color-1", color1);
        item.style.setProperty("--bonus-color-2", color2);
        item.style.setProperty("--bonus-color-3", color3);
        item.style.setProperty("--bonus-color-4", color4);
        item.style.setProperty("--bonus-step", getSelectedBonusStripeSize());
        item.innerHTML = `
          <span class="mutation-content">
            <span class="mutation-name">${name}</span>
            <span class="mutation-bonus">+${bonus}%</span>
          </span>
        `;
        item.addEventListener("click", () => {
          if (isTrait) {
            if (state.selectedMutations.has(name)) {
              state.selectedMutations.delete(name);
            } else {
              state.selectedMutations.add(name);
            }
          } else {
            for (const [mutationName] of mutations) {
              state.selectedMutations.delete(mutationName);
            }

            if (!isActive) {
              state.selectedMutations.add(name);
            }
          }
          invalidateCalculatedResult();
          renderBonusGrid(els.traitsGrid, traits, "trait");
          renderBonusGrid(els.mutationsGrid, mutations, "mutation");
          calculate();
        });
        container.appendChild(item);
      }
    }

    function renderSearchResults(matches) {
      els.results.innerHTML = "";

      if (!matches.length) {
        els.results.innerHTML = '<div class="empty-state">No matching stats found.</div>';
      } else {
        let currentRarity = "";

        for (const match of matches) {
          const colorClass = brainrotColors[match.name] || "";
          const rarity = getRarityMeta(match);

          if (rarity.label !== currentRarity) {
            currentRarity = rarity.label;
            const block = document.createElement("div");
            block.className = "search-rarity-block";

            const label = document.createElement("div");
            label.className = `search-rarity-label ${rarity.className}`;
            label.textContent = rarity.label;
            block.appendChild(label);
            els.results.appendChild(block);
          }

          const block = els.results.lastElementChild;
          const option = document.createElement("div");
          option.className = `search-option${match.unavailable ? " unavailable" : ""}`;
          option.innerHTML = `<span class="brainrot-name ${colorClass}">${renderBrainrotNameMarkup(match.name, colorClass)}</span><span class="subtle">${match.secretLabel || (match.unavailable ? "Unavailable" : `${match.approximate ? "[Around] " : ""}$${formatMoney(match.value)} ${match.unit.replace("$ /", "/")}`)}</span>`;
          applyVangaSparkles(option.querySelector(".brainrot-name"), colorClass === "brainrot-vanga");
          if (!match.unavailable || match.secretLabel) {
            option.addEventListener("click", () => {
              state.selectedStat = match;
              state.hasCalculated = false;
              els.search.value = match.name;
              els.results.classList.remove("show");
              calculate();
            });
          }
          block.appendChild(option);
        }
      }

      els.results.classList.add("show");
      els.searchWrap.classList.add("open");
      setupVangaSparkleTimers();
    }

    function applySearchSize(size) {
      els.results.classList.remove("size-small", "size-medium", "size-large");
      els.results.classList.add(`size-${size}`);
    }

    function updateSearchResults(query) {
      const normalized = query.trim().toLowerCase();
      const matches = baseStats
        .filter((item) =>
          !normalized
            ? !shouldHideFromOpenList(item)
            : item.hiddenExact
              ? normalized === item.name.toLowerCase()
              : item.name.toLowerCase().includes(normalized)
        )
        .sort((a, b) => {
          const rarityDiff = getRarityMeta(a).order - getRarityMeta(b).order;
          if (rarityDiff !== 0) {
            return rarityDiff;
          }
          return (a.value || Number.MAX_SAFE_INTEGER) - (b.value || Number.MAX_SAFE_INTEGER);
        });

      if (!normalized && !document.activeElement?.isSameNode(els.search)) {
        els.results.classList.remove("show");
        els.searchWrap.classList.remove("open");
        return;
      }

      renderSearchResults(matches);
    }

    function calculate() {
      const mutationPercent = [...state.selectedMutations]
        .map((name) =>
          [...traits, ...mutations].find(([bonusName]) => bonusName === name)?.[1] || 0
        )
        .reduce((sum, value) => sum + value, 0);

      const rankMult = 1 + (state.rank * 0.15);
      const levelMult = 1 + Math.max(0, state.level - 1) * 0.5;
      const mutationMult = 1 + mutationPercent / 100;

      els.mutationTotal.textContent = `${mutationPercent}%`;
      els.levelValue.value = String(state.level);

      if (!state.selectedStat) {
        els.baseStat.textContent = "—";
        els.finalStat.textContent = "—";
        els.finalUnit.textContent = "$ / Fish";
        els.rankMultiplier.textContent = "—";
        els.levelMultiplier.textContent = "—";
        els.mutationMultiplier.textContent = "—";
        els.formulaValue.textContent = "—";
        els.statusBadge.textContent = "Invalid";
        els.statusBadge.classList.remove("ready");
        applySelectedAccent();
        updateSelectedBrainrotLabel();
        updateControlLocking();
        renderBonusGrid(els.traitsGrid, traits, "trait");
        renderBonusGrid(els.mutationsGrid, mutations, "mutation");
        renderRanks();
        return;
      }

      els.baseStat.textContent = formatMoney(state.selectedStat.value);
      els.selectedUnit.textContent = state.selectedStat.unit;
      els.statusBadge.textContent = "Ready";
      els.statusBadge.classList.add("ready");
      applySelectedAccent();
      updateSelectedBrainrotLabel();
      updateControlLocking();
      renderBonusGrid(els.traitsGrid, traits, "trait");
      renderBonusGrid(els.mutationsGrid, mutations, "mutation");

      if (!state.hasCalculated) {
        els.finalStat.textContent = "—";
        els.finalUnit.textContent = state.selectedStat.unit;
        els.rankMultiplier.textContent = "—";
        els.levelMultiplier.textContent = "—";
        els.mutationMultiplier.textContent = "—";
        els.formulaValue.textContent = "—";
        renderRanks();
        return;
      }

      const finalValue = state.selectedStat.value * rankMult * levelMult * mutationMult;

      els.finalStat.textContent = formatMaybeAround(finalValue, state.selectedStat);
      els.finalUnit.textContent = state.selectedStat.unit;
      els.rankMultiplier.textContent = `${rankMult.toFixed(2)}×`;
      els.levelMultiplier.textContent = `${levelMult.toFixed(2)}×`;
      els.mutationMultiplier.textContent = `${mutationMult.toFixed(2)}×`;
      els.formulaValue.textContent = `${formatMaybeAround(finalValue, state.selectedStat)}`;
      renderRanks();
    }

    document.getElementById("levelDown").addEventListener("click", () => {
      state.level = Math.max(1, state.level - 1);
      invalidateCalculatedResult();
      calculate();
    });

    document.getElementById("levelUp").addEventListener("click", () => {
      state.level += 1;
      invalidateCalculatedResult();
      calculate();
    });

    els.levelValue.addEventListener("input", (event) => {
      const rawValue = event.target.value.replace(/[^\d]/g, "");
      if (!rawValue) {
        event.target.value = "";
        return;
      }

      state.level = Math.max(1, Number(rawValue));
      invalidateCalculatedResult();
      calculate();
    });

    els.levelValue.addEventListener("blur", (event) => {
      if (!event.target.value.trim()) {
        state.level = 1;
        invalidateCalculatedResult();
        calculate();
      }
    });

    els.search.addEventListener("input", (event) => {
      if (!event.target.value.trim()) {
        state.selectedStat = null;
        state.hasCalculated = false;
        calculate();
      }
      updateSearchResults(event.target.value);
    });

    els.search.addEventListener("focus", () => {
      updateSearchResults(els.search.value);
    });

    document.getElementById("searchSizeSelect").addEventListener("change", (event) => {
      applySearchSize(event.target.value);
      if (els.results.classList.contains("show")) {
        updateSearchResults(els.search.value);
      }
    });

    els.clear.addEventListener("click", () => {
      els.search.value = "";
      state.selectedStat = null;
      state.hasCalculated = false;
      els.searchWrap.classList.remove("open");
      calculate();
      updateSearchResults("");
    });

    els.calculateBtn.addEventListener("click", () => {
      if (!state.selectedStat) {
        return;
      }
      state.hasCalculated = true;
      calculate();
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".search-wrap")) {
        els.results.classList.remove("show");
        els.searchWrap.classList.remove("open");
      }
    });

    renderRanks();
    renderBonusGrid(els.traitsGrid, traits, "trait");
    renderBonusGrid(els.mutationsGrid, mutations, "mutation");
    applySearchSize("medium");
    calculate();
  </script>
</body>
</html>
