<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFB Calc</title>
  <style>
    :root {
      --bg: #0f1728;
      --panel: #182338;
      --panel-soft: #1d2a44;
      --line: rgba(154, 177, 214, 0.18);
      --line-strong: rgba(190, 210, 242, 0.26);
      --text: #f2f6ff;
      --muted: #8fa5cd;
      --blue: #4f92ff;
      --blue-strong: #3579eb;
      --pill: #22304c;
      --danger: #ff7f86;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Inter, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 146, 255, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(99, 197, 255, 0.10), transparent 24%),
        linear-gradient(180deg, #0b1322 0%, #10192c 100%);
      padding: 16px;
    }

    .app {
      width: min(1220px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr 360px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: linear-gradient(180deg, rgba(24, 35, 56, 0.96), rgba(20, 30, 48, 0.94));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    h2, h3, p {
      margin: 0;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .badge {
      border: 1px solid rgba(255, 127, 134, 0.45);
      color: #ff9ca1;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      background: rgba(255, 127, 134, 0.08);
    }

    .badge.ready {
      border-color: rgba(111, 229, 156, 0.42);
      color: #9df0b8;
      background: rgba(111, 229, 156, 0.10);
    }

    .field {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      height: 44px;
      padding: 0 44px 0 14px;
      border-radius: 16px;
      border: 1px solid var(--line-strong);
      background: rgba(14, 23, 37, 0.46);
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    .search-input::placeholder {
      color: #7287af;
    }

    .clear-search {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      padding: 14px;
      margin-bottom: 12px;
    }

    .stat-main {
      font-size: 38px;
      line-height: 1;
      font-weight: 700;
      margin: 2px 0 6px;
    }

    .subtle {
      color: var(--muted);
      font-size: 14px;
    }

    .divider {
      border-top: 1px solid var(--line);
      margin: 14px 0;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: rgba(12, 19, 31, 0.65);
      margin-bottom: 16px;
    }

    .segmented button,
    .level-btn,
    .action-btn {
      font: inherit;
      cursor: pointer;
      border: 0;
      color: var(--text);
    }

    .segmented button {
      border-radius: 999px;
      height: 34px;
      background: transparent;
      font-weight: 600;
    }

    .segmented button.active {
      background: linear-gradient(180deg, var(--blue), var(--blue-strong));
    }

    .segmented button.accent-gray.active {
      background: linear-gradient(180deg, #8993a5, #6f7889);
    }

    .segmented button.accent-green.active {
      background: linear-gradient(180deg, #83ec99, #54bf6b);
    }

    .segmented button.accent-light-blue.active {
      background: linear-gradient(180deg, #98dcff, #63b8f4);
    }

    .segmented button.accent-purple.active {
      background: linear-gradient(180deg, #c59dff, #8f64e6);
    }

    .segmented button.accent-light-yellow.active {
      background: linear-gradient(180deg, #ffe881, #e8b93e);
      color: #1d1a0d;
    }

    .segmented button.accent-red.active {
      background: linear-gradient(180deg, #ff8d8d, #d55454);
    }

    .segmented button.accent-dark-pink.active {
      background: linear-gradient(180deg, #efabd2, #c86f9f);
    }

    .segmented button.accent-wave-gray.active {
      background: linear-gradient(120deg, #d8dbe1, #6a707a, #181b20, #d8dbe1);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .segmented button.accent-yellow-orange.active {
      background: linear-gradient(180deg, #ffef7e, #ffb853, #ff8f36);
      color: #231807;
    }

    .segmented button.accent-white-black-mid.active {
      background: linear-gradient(120deg, #ffffff, #d7d7d7, #111111, #ffffff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .segmented button.accent-wave-rainbow.active {
      background: linear-gradient(120deg, #94ddff, #4f92ff, #9b6dff, #f58fd6, #94ddff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .segmented button.accent-wave-black-white.active {
      background: linear-gradient(120deg, #ffffff, #c8ccd4, #0f1117, #ffffff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .segmented button.accent-wave-sun.active {
      background: linear-gradient(180deg, #ffef7e, #ffc85e, #ff9937);
      color: #231807;
    }

    .segmented button.accent-wave-ocean.active {
      background: linear-gradient(180deg, #c7f6ff, #6cc3ff, #16358f);
    }

    .segmented button.accent-rainbow.active {
      background: linear-gradient(120deg, #ff7b7b, #ffba66, #fff06e, #82ef9f, #7fd7ff, #a88dff, #ff8ddb);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
      color: #17130c;
    }

    .level-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      margin-bottom: 8px;
    }

    .level-btn,
    .level-display {
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line-strong);
      background: rgba(12, 19, 31, 0.65);
      font-weight: 600;
    }

    .level-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .level-display {
      width: 100%;
      text-align: center;
      color: var(--text);
      outline: none;
      font: inherit;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .level-display::-webkit-outer-spin-button,
    .level-display::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .action-btn {
      width: 100%;
      height: 44px;
      border-radius: 15px;
      background: linear-gradient(180deg, var(--blue), var(--blue-strong));
      font-weight: 700;
      margin-top: 10px;
      transition: background 180ms ease, box-shadow 180ms ease, color 180ms ease;
    }

    .mutations-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mutation {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      border-radius: 17px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      background: #ffffff;
      color: #12203a;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .mutation-content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .mutation:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 171, 255, 0.9);
    }

    .mutation.active {
      background: #dce9ff;
      border-color: rgba(102, 165, 255, 0.95);
    }

    .mutation-name {
      font-weight: 600;
    }

    .mutation-bonus {
      color: #5573a5;
      white-space: nowrap;
    }

    .trait-card::before,
    .animated-border-card::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 20px;
      padding: 3px;
      background:
        repeating-linear-gradient(
          135deg,
          #111318 0 72px,
          #ffffff 72px 144px,
          #111318 144px 216px,
          #ffffff 216px 288px
        );
      background-size: 500% 500%;
      opacity: 0;
      transition: opacity 180ms ease;
      animation: traitFlow 6.2s linear infinite;
      z-index: 0;
      pointer-events: none;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask-composite: exclude;
    }

    .trait-card.active,
    .animated-border-card.active {
      background: #ffffff;
      border-color: rgba(25, 25, 31, 0.18);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
    }

    .trait-card.active::before,
    .animated-border-card.active::before {
      opacity: 1;
    }

    @keyframes traitFlow {
      0% {
        background-position: 0% 0%;
      }

      100% {
        background-position: 100% 100%;
      }
    }

    .result-card {
      min-height: 118px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .metric {
      min-height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .stat-accent {
      transition: color 180ms ease, background-image 180ms ease;
    }

    .accent-gray {
      color: #a9b2c3;
    }

    .accent-green {
      color: #76e58d;
    }

    .accent-light-blue {
      color: #86cfff;
    }

    .accent-purple {
      color: #b68cff;
    }

    .accent-light-yellow {
      color: #ffe679;
    }

    .accent-red {
      color: #ff7a7a;
    }

    .accent-dark-pink {
      color: #e08bc2;
    }

    .accent-wave-gray,
    .accent-yellow-orange,
    .accent-white-black-mid,
    .accent-wave-rainbow,
    .accent-wave-black-white,
    .accent-wave-sun,
    .accent-wave-ocean,
    .accent-rainbow {
      background-size: 220% 220%;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: brainrotWave 4.8s linear infinite;
    }

    .accent-wave-gray {
      background-image: linear-gradient(120deg, #0f1117 0%, #666b74 35%, #d6d9df 50%, #555a63 70%, #0f1117 100%);
    }

    .accent-yellow-orange {
      background-image: linear-gradient(180deg, #ffef7e 0%, #ffc85e 45%, #ff9937 100%);
    }

    .accent-white-black-mid {
      background-image: linear-gradient(90deg, #ffffff 0%, #e7e7e7 35%, #111111 50%, #ebebeb 65%, #ffffff 100%);
    }

    .accent-wave-rainbow {
      background-image: linear-gradient(120deg, #94ddff 0%, #4f92ff 25%, #9b6dff 50%, #f58fd6 75%, #94ddff 100%);
    }

    .accent-wave-black-white {
      background-image: linear-gradient(120deg, #ffffff 0%, #d7d7d7 25%, #0f1117 50%, #c8ccd4 75%, #ffffff 100%);
    }

    .accent-wave-sun {
      background-image: linear-gradient(180deg, #ffef7e 0%, #ffc85e 45%, #ff9937 100%);
    }

    .accent-wave-ocean {
      background-image: linear-gradient(180deg, #c7f6ff 0%, #6cc3ff 38%, #16358f 100%);
    }

    .accent-rainbow {
      background-image: linear-gradient(120deg, #ff7b7b 0%, #ffba66 18%, #fff06e 36%, #82ef9f 54%, #7fd7ff 72%, #a88dff 86%, #ff8ddb 100%);
    }

    .action-btn.accent-gray {
      background: linear-gradient(180deg, #8993a5, #6f7889);
    }

    .action-btn.accent-green {
      background: linear-gradient(180deg, #83ec99, #54bf6b);
    }

    .action-btn.accent-light-blue {
      background: linear-gradient(180deg, #98dcff, #63b8f4);
    }

    .action-btn.accent-purple {
      background: linear-gradient(180deg, #c59dff, #8f64e6);
    }

    .action-btn.accent-light-yellow {
      background: linear-gradient(180deg, #ffe881, #e8b93e);
      color: #1d1a0d;
    }

    .action-btn.accent-red {
      background: linear-gradient(180deg, #ff8d8d, #d55454);
    }

    .action-btn.accent-dark-pink {
      background: linear-gradient(180deg, #efabd2, #c86f9f);
    }

    .action-btn.accent-wave-gray {
      background: linear-gradient(120deg, #d8dbe1, #6a707a, #181b20, #d8dbe1);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .action-btn.accent-yellow-orange {
      background: linear-gradient(180deg, #ffef7e, #ffb853, #ff8f36);
    }

    .action-btn.accent-white-black-mid {
      background: linear-gradient(120deg, #ffffff, #d7d7d7, #111111, #ffffff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .action-btn.accent-wave-rainbow {
      background: linear-gradient(120deg, #94ddff, #4f92ff, #9b6dff, #f58fd6, #94ddff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .action-btn.accent-wave-black-white {
      background: linear-gradient(120deg, #ffffff, #c8ccd4, #0f1117, #ffffff);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .action-btn.accent-wave-sun {
      background: linear-gradient(180deg, #ffef7e, #ffc85e, #ff9937);
      color: #231807;
    }

    .action-btn.accent-wave-ocean {
      background: linear-gradient(180deg, #c7f6ff, #6cc3ff, #16358f);
    }

    .action-btn.accent-rainbow {
      background: linear-gradient(120deg, #ff7b7b, #ffba66, #fff06e, #82ef9f, #7fd7ff, #a88dff, #ff8ddb);
      background-size: 220% 220%;
      animation: brainrotWave 6.2s linear infinite;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #16233a;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
      display: none;
      z-index: 5;
    }

    .search-results.show {
      display: block;
    }

    .search-option {
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
    }

    .search-option:hover {
      background: rgba(79, 146, 255, 0.12);
    }

    .search-option.unavailable {
      cursor: not-allowed;
      color: #7f91b3;
    }

    .search-option.unavailable:hover {
      background: transparent;
    }

    .brainrot-name {
      font-weight: 700;
    }

    .brainrot-gray {
      color: #a9b2c3;
    }

    .brainrot-green {
      color: #76e58d;
    }

    .brainrot-light-blue {
      color: #86cfff;
    }

    .brainrot-purple {
      color: #b68cff;
    }

    .brainrot-light-yellow {
      color: #ffe679;
    }

    .brainrot-red {
      color: #ff7a7a;
    }

    .brainrot-dark-pink {
      color: #e08bc2;
    }

    .brainrot-wave-gray,
    .brainrot-yellow-orange,
    .brainrot-white-black-mid,
    .brainrot-wave-rainbow,
    .brainrot-wave-black-white,
    .brainrot-wave-sun,
    .brainrot-wave-ocean,
    .brainrot-rainbow {
      background-size: 220% 220%;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: brainrotWave 4.8s linear infinite;
    }

    .brainrot-wave-gray {
      background-image: linear-gradient(120deg, #0f1117 0%, #666b74 35%, #d6d9df 50%, #555a63 70%, #0f1117 100%);
    }

    .brainrot-yellow-orange {
      background-image: linear-gradient(180deg, #ffe86f 0%, #ffd84e 45%, #ffb347 100%);
    }

    .brainrot-white-black-mid {
      background-image: linear-gradient(90deg, #ffffff 0%, #e7e7e7 35%, #111111 50%, #ebebeb 65%, #ffffff 100%);
    }

    .brainrot-wave-rainbow {
      background-image: linear-gradient(120deg, #94ddff 0%, #4f92ff 25%, #9b6dff 50%, #f58fd6 75%, #94ddff 100%);
    }

    .brainrot-wave-black-white {
      background-image: linear-gradient(120deg, #ffffff 0%, #d7d7d7 25%, #0f1117 50%, #c8ccd4 75%, #ffffff 100%);
    }

    .brainrot-wave-sun {
      background-image: linear-gradient(180deg, #ffef7e 0%, #ffc85e 45%, #ff9937 100%);
    }

    .brainrot-wave-ocean {
      background-image: linear-gradient(180deg, #c7f6ff 0%, #6cc3ff 38%, #16358f 100%);
    }

    .brainrot-rainbow {
      background-image: linear-gradient(120deg, #ff7b7b 0%, #ffba66 18%, #fff06e 36%, #82ef9f 54%, #7fd7ff 72%, #a88dff 86%, #ff8ddb 100%);
    }

    @keyframes brainrotWave {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 200% 50%;
      }
    }

    .empty-state {
      padding: 12px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1080px) {
      .app {
        grid-template-columns: 1fr;
      }
    }

    .page-signature {
      width: min(1220px, 100%);
      margin: 12px auto 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.58);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="section-head">
        <h3>Inputs</h3>
        <div class="badge" id="statusBadge">Invalid</div>
      </div>

      <div class="field">
        <label class="label" for="brainrotSearch">Brainrot</label>
        <div class="search-wrap">
          <input id="brainrotSearch" class="search-input" type="text" placeholder="Search brainrot..." autocomplete="off">
          <button class="clear-search" id="clearSearch" aria-label="Clear search">×</button>
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>

      <div class="card">
        <div class="subtle">Base Stat</div>
        <div class="stat-main" id="baseStat">—</div>
        <div class="subtle" id="selectedUnit">$ / Fish</div>
      </div>

      <div class="card">
        <div class="subtle">Mutation Total</div>
        <div class="stat-main" id="mutationTotal">0%</div>
        <div class="subtle">stacked</div>
      </div>

      <div class="divider"></div>

      <div class="meta-row">
        <span class="label" style="margin: 0;">Rank</span>
        <span class="subtle">+15% per rank</span>
      </div>
      <div class="segmented" id="rankSelector"></div>

      <div class="field">
        <label class="label">Level</label>
        <div class="level-row">
          <button class="level-btn" id="levelDown">−</button>
          <input class="level-display" id="levelValue" type="number" min="1" step="1" value="1" inputmode="numeric">
          <button class="level-btn" id="levelUp">+</button>
        </div>
        <div class="subtle">+50% per level after 1</div>
      </div>

      <button class="action-btn" id="calculateBtn">Calculate Stat</button>
    </section>

    <section class="panel">
      <div class="section-head" style="display:block;">
        <h3 style="margin-bottom:8px;">Bonuses</h3>
        <p class="subtle">Tap to toggle. Percentages stack (sum → multiplier).</p>
      </div>
      <div class="field" style="margin-bottom: 18px;">
        <div class="meta-row" style="margin-bottom: 10px;">
          <span class="label" style="margin: 0;">Traits</span>
        </div>
        <div class="mutations-grid" id="traitsGrid"></div>
      </div>
      <div class="field" style="margin-bottom: 0;">
        <div class="meta-row" style="margin-bottom: 10px;">
          <span class="label" style="margin: 0;">Mutations</span>
        </div>
        <div class="mutations-grid" id="mutationsGrid"></div>
      </div>
    </section>

    <aside class="panel">
      <div class="card result-card">
        <div class="subtle">Final Stat</div>
        <div class="stat-main stat-accent" id="finalStat">—</div>
        <div class="subtle stat-accent" id="finalUnit">$ / Fish</div>
      </div>

      <div class="divider"></div>

      <div class="card metric">
        <span class="subtle">Rank multiplier</span>
        <span class="metric-value" id="rankMultiplier">—</span>
      </div>

      <div class="card metric">
        <span class="subtle">Level multiplier</span>

    ]);

    function formatMoney(value) {
      if (value >= 1000000000000) {
        const trillions = value / 1000000000000;
        return `${Number(trillions.toFixed(trillions >= 10 ? 0 : 2)).toString()}T`;
      }

      if (value >= 1000000000) {
        const billions = value / 1000000000;
        return `${Number(billions.toFixed(billions >= 10 ? 0 : 2)).toString()}B`;
      }

      if (value >= 1000000) {
        const millions = value / 1000000;
        return `${Number(millions.toFixed(millions >= 10 ? 0 : 2)).toString()}M`;
      }

      return new Intl.NumberFormat("en-US", {
        maximumFractionDigits: value >= 100 ? 0 : 2
      }).format(value);
    }

    function clearAccentClasses(element) {
      for (const className of Object.values(accentMap)) {
        element.classList.remove(className);
      }
    }

    function applySelectedAccent() {
      clearAccentClasses(els.calculateBtn);
      clearAccentClasses(els.finalStat);
      clearAccentClasses(els.finalUnit);
      els.calculateBtn.style.color = "";

      if (!state.selectedStat) {
        return;
      }

      const accentClass = accentMap[brainrotColors[state.selectedStat.name]];
      if (!accentClass) {
        return;
      }

      els.calculateBtn.classList.add(accentClass);
      els.finalStat.classList.add(accentClass);
      els.finalUnit.classList.add(accentClass);
      els.calculateBtn.style.color = darkTextAccents.has(accentClass) ? "#17130c" : "#f8fbff";
    }

    function renderRanks() {
      els.rankSelector.innerHTML = "";
      const accentClass = state.selectedStat ? accentMap[brainrotColors[state.selectedStat.name]] : "";
      for (let i = 0; i <= 4; i += 1) {
        const button = document.createElement("button");
        button.textContent = String(i);
        if (state.rank === i) {
          button.classList.add("active");
          if (accentClass) {
            button.classList.add(accentClass);
          }
        }
        button.addEventListener("click", () => {
          state.rank = i;
          renderRanks();
          calculate();
        });
        els.rankSelector.appendChild(button);
      }
    }

    function renderBonusGrid(container, items, type) {
      container.innerHTML = "";

      for (const [name, bonus] of items) {
        const item = document.createElement("button");
        const isTrait = type === "trait";
        const isActive = state.selectedMutations.has(name);

        item.className = `mutation animated-border-card${isTrait ? " trait-card" : ""}`;
        if (isActive) item.classList.add("active");
        item.innerHTML = `
          <span class="mutation-content">
            <span class="mutation-name">${name}</span>
            <span class="mutation-bonus">+${bonus}%</span>
          </span>
        `;
        item.addEventListener("click", () => {
          if (state.selectedMutations.has(name)) {
            state.selectedMutations.delete(name);
          } else {
            state.selectedMutations.add(name);
          }
          renderBonusGrid(els.traitsGrid, traits, "trait");
          renderBonusGrid(els.mutationsGrid, mutations, "mutation");
          calculate();
        });
        container.appendChild(item);
      }
    }

    function updateSearchResults(query) {
      const normalized = query.trim().toLowerCase();
      const matches = baseStats.filter((item) =>
        item.name.toLowerCase().includes(normalized)
      );
      els.results.innerHTML = "";

      if (!query.trim()) {
        els.results.classList.remove("show");
        return;
      }

      if (!matches.length) {
        els.results.innerHTML = '<div class="empty-state">No matching stats found.</div>';
      } else {
        for (const match of matches) {
          const option = document.createElement("div");
          option.className = `search-option${match.unavailable ? " unavailable" : ""}`;
          const colorClass = brainrotColors[match.name] || "";
          option.innerHTML = `<span class="brainrot-name ${colorClass}">${match.name}</span><span class="subtle">${match.unavailable ? "Unavailable" : `$${formatMoney(match.value)} ${match.unit.replace("$ /", "/")}`}</span>`;
          if (!match.unavailable) {
            option.addEventListener("click", () => {
              state.selectedStat = match;
              els.search.value = match.name;
              els.results.classList.remove("show");
              calculate();
            });
          }
          els.results.appendChild(option);
        }
      }

      els.results.classList.add("show");
    }

    function calculate() {
      const mutationPercent = [...state.selectedMutations]
        .map((name) =>
          [...traits, ...mutations].find(([bonusName]) => bonusName === name)?.[1] || 0
        )
        .reduce((sum, value) => sum + value, 0);

      const rankMult = 1 + (state.rank * 0.15);
      const levelMult = 1 + Math.max(0, state.level - 1) * 0.5;
      const mutationMult = 1 + mutationPercent / 100;

      els.mutationTotal.textContent = `${mutationPercent}%`;
      els.levelValue.value = String(state.level);

      if (!state.selectedStat) {
        els.baseStat.textContent = "—";
        els.finalStat.textContent = "—";
        els.finalUnit.textContent = "$ / Fish";
        els.rankMultiplier.textContent = "—";
        els.levelMultiplier.textContent = "—";
        els.mutationMultiplier.textContent = "—";
        els.formulaValue.textContent = "—";
        els.statusBadge.textContent = "Invalid";
        els.statusBadge.classList.remove("ready");
        applySelectedAccent();
        renderRanks();
        return;
      }

      const finalValue = state.selectedStat.value * rankMult * levelMult * mutationMult;

      els.baseStat.textContent = formatMoney(state.selectedStat.value);
      els.selectedUnit.textContent = state.selectedStat.unit;
      els.finalStat.textContent = formatMoney(finalValue);
      els.finalUnit.textContent = state.selectedStat.unit;
      els.rankMultiplier.textContent = `${rankMult.toFixed(2)}×`;
      els.levelMultiplier.textContent = `${levelMult.toFixed(2)}×`;
      els.mutationMultiplier.textContent = `${mutationMult.toFixed(2)}×`;
      els.formulaValue.textContent = `${formatMoney(finalValue)}`;
      els.statusBadge.textContent = "Ready";
      els.statusBadge.classList.add("ready");
      applySelectedAccent();
      renderRanks();
    }

    document.getElementById("levelDown").addEventListener("click", () => {
      state.level = Math.max(1, state.level - 1);
      calculate();
    });

    document.getElementById("levelUp").addEventListener("click", () => {
      state.level += 1;
      calculate();
    });

    els.levelValue.addEventListener("input", (event) => {
      const rawValue = event.target.value.replace(/[^\d]/g, "");
      if (!rawValue) {
        event.target.value = "";
        return;
      }

      state.level = Math.max(1, Number(rawValue));
      calculate();
    });

    els.levelValue.addEventListener("blur", (event) => {
      if (!event.target.value.trim()) {
        state.level = 1;
        calculate();
      }
    });

    els.search.addEventListener("input", (event) => {
      if (!event.target.value.trim()) {
        state.selectedStat = null;
        calculate();
      }
      updateSearchResults(event.target.value);
    });

    els.clear.addEventListener("click", () => {
      els.search.value = "";
      state.selectedStat = null;
      els.results.classList.remove("show");
      calculate();
    });

    els.calculateBtn.addEventListener("click", calculate);

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".search-wrap")) {
        els.results.classList.remove("show");
      }
    });

    renderRanks();
    renderBonusGrid(els.traitsGrid, traits, "trait");
    renderBonusGrid(els.mutationsGrid, mutations, "mutation");
    calculate();
